<div class="container-fluid">

  <div class="row justify-content-center text-center mt-4">
    <div class="col-12 col-md-8 col-lg-6">
      
      <img src="{{ site.author.image }}" alt="{{ site.author.name }}" class="rounded-circle shadow-sm wow animated zoomIn mb-4" data-wow-delay=".1s" style="width: 180px; height: 180px; object-fit: cover;">  

      <h1 class="mb-3"><strong>About Me</strong></h1>

      <p class="text-muted wow animated slideInUp mb-4" style="line-height: 1.8;" data-wow-delay=".15s">
        Hi I am <strong>{{ site.author.name }}</strong> :wave:<br> {{ site.description }}
      </p>

    </div>
  </div>

  <div class="row justify-content-center mt-2 wow animated slideInUp">
    <div class="col-12 col-md-10 col-lg-8"> 
      {% include about/timeline.html %}
    </div>
    <div class="col-12 col-md-10 col-lg-8"> 
      {% include projects/index.html %}
    </div>
  </div>
  <div class="row justify-content-center mt-2">
    <div class="col-12 col-md-10 col-lg-8"> 
      <span class="nav-item nav-link align-items-center justify-content-center text-center text-muted" style="font-size: 0.9rem;">
        <i class="fas fa-code"></i>&nbsp;with&nbsp;<i class="fas fa-heart"></i>&nbsp;by&nbsp;<strong>{{ site.author.name }}</strong>
      </span>
    </div>
  </div>
</div>
